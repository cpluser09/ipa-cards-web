<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>国际音标学习卡片</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #f2f2f7;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        .container {
            max-width: 1024px;
            margin: 0 auto;
            padding: 20px;
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .card {
            width: 80%;
            max-width: 600px;
            margin: 20px auto;
            padding: 40px;
            background: #ffffff;
            border-radius: 16px;
            position: relative;
            text-align: center;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            border: 1px solid rgba(0, 0, 0, 0.05);
        }

        .phonetic-symbol {
            font-size: 96px;
            font-weight: bold;
            text-align: center;
            margin-bottom: 30px;
            color: #000000;
            letter-spacing: -1px;
        }

        .info-section {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
            margin-bottom: 24px;
        }

        .info-item {
            background-color: #f8f8f8;
            padding: 16px;
            border-radius: 12px;
        }

        .info-label {
            font-size: 13px;
            color: #8e8e93;
            margin-bottom: 6px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .info-content {
            font-size: 18px;
            color: #000000;
            font-weight: 600;
        }

        .pronunciation-section {
            background-color: #f8f8f8;
            padding: 20px;
            border-radius: 12px;
            font-size: 16px;
            color: #000000;
            line-height: 1.5;
        }

        .pronunciation-title {
            font-weight: 600;
            margin-bottom: 8px;
            color: #000000;
        }

        .examples {
            margin-top: 8px;
            font-style: italic;
            color: #636366;
            font-size: 15px;
        }

        .controls {
            display: flex;
            justify-content: space-between;
            width: 80%;
            max-width: 500px;
            margin: 24px auto;
        }

        .control-btn {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background-color: #007aff;
            color: white;
            border: none;
            font-size: 24px;
            cursor: pointer;
            transition: background-color 0.3s, transform 0.2s;
            box-shadow: 0 2px 10px rgba(0, 122, 255, 0.3);
        }

        .control-btn:hover {
            background-color: #0051d5;
            transform: scale(1.05);
        }

        .control-btn:active {
            transform: scale(0.95);
        }

        .control-btn:disabled {
            background-color: #d1d1d6;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .playback-controls {
            display: flex;
            justify-content: center;
            gap: 16px;
            width: 80%;
            max-width: 600px;
            margin: 24px auto;
        }

        .playback-btn {
            padding: 12px 28px;
            border-radius: 12px;
            background-color: #007aff;
            color: white;
            border: none;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.3s, transform 0.2s;
            box-shadow: 0 2px 10px rgba(0, 122, 255, 0.3);
        }

        .playback-btn:hover {
            background-color: #0051d5;
            transform: translateY(-2px);
        }

        .playback-btn:active {
            transform: translateY(0);
        }

        .playback-btn.active {
            background-color: #34c759;
            box-shadow: 0 2px 10px rgba(52, 199, 89, 0.3);
        }

        .index-section {
            display: grid;
            grid-template-columns: repeat(12, 1fr);
            gap: 8px;
            width: 90%;
            max-width: 1000px;
            margin: 24px auto;
        }

        .index-btn {
            aspect-ratio: 1;
            border-radius: 8px;
            background-color: #e5e5ea;
            color: #000000;
            border: none;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.3s, transform 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .index-btn:hover {
            background-color: #d1d1d6;
            transform: scale(1.05);
        }

        .index-btn:active {
            transform: scale(0.95);
        }

        .index-btn.active {
            background-color: #007aff;
            color: white;
        }

        .footer {
            text-align: center;
            padding: 16px;
            background-color: #f2f2f7;
            color: #8e8e93;
            font-size: 14px;
            border-top: 1px solid #e5e5ea;
        }

        @media (max-width: 600px) {
            .container {
                padding: 16px;
            }
            
            .card {
                width: 100%;
                padding: 24px;
                margin: 16px auto;
            }
            
            .phonetic-symbol {
                font-size: 72px;
            }
            
            .info-section {
                grid-template-columns: 1fr;
                gap: 16px;
            }
            
            .controls {
                width: 100%;
            }
            
            .control-btn {
                width: 48px;
                height: 48px;
                font-size: 20px;
            }
            
            .playback-controls {
                width: 100%;
                gap: 12px;
                flex-wrap: wrap;
            }
            
            .playback-btn {
                padding: 10px 20px;
                font-size: 15px;
            }
            
            .index-section {
                grid-template-columns: repeat(8, 1fr);
                gap: 6px;
                width: 100%;
            }
            
            .index-btn {
                font-size: 12px;
            }
        }

        @media (min-width: 601px) and (max-width: 1024px) {
            .index-section {
                grid-template-columns: repeat(12, 1fr);
                gap: 8px;
            }
            
            .index-btn {
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="phonetic-symbol" id="phoneticSymbol">/i:/</div>
            <div class="info-section">
                <div class="info-item">
                    <div class="info-label">音标名称</div>
                    <div class="info-content" id="phoneticName">长衣音</div>
                </div>
                <div class="info-item">
                    <div class="info-label">中文谐音</div>
                    <div class="info-content" id="phoneticPinyin">衣（拉长）</div>
                </div>
            </div>
            <div class="pronunciation-section">
                <div class="pronunciation-title">发音规则</div>
                <div id="pronunciationRule">舌尖靠近下齿，舌前部抬起，嘴唇向两旁张开成扁平形</div>
                <div class="examples" id="exampleWords">例词：sheep, green, please</div>
            </div>
        </div>
        <div class="controls">
            <button class="control-btn" id="prevBtn" onclick="prevCard();">&#8249;</button>
            <button class="control-btn" id="nextBtn" onclick="nextCard();">&#8250;</button>
        </div>
        <div class="playback-controls">
            <button class="playback-btn" id="seqBtn" onclick="setPlaybackMode('sequential')">顺序播放</button>
            <button class="playback-btn" id="randBtn" onclick="setPlaybackMode('random')">随机播放</button>
            <button class="playback-btn" id="pauseBtn" onclick="pausePlayback()">暂停</button>
        </div>
        <div class="index-section" id="indexSection"></div>
    </div>
    <div class="footer">
        国际音标学习卡片 - Created by cpluser09
    </div>

    <script src="app.js"></script>
</body>
</html>
