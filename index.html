<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>国际音标学习卡片</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #f0f9ff; /* 浅蓝色背景，护眼 */
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        .container {
            max-width: 1024px;
            margin: 0 auto;
            padding: 10px; /* 减少内边距 */
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .card {
            width: 85%;
            min-width: 750px; /* 进一步增大卡片宽度，防止高度变化 */
            max-width: 800px;
            margin: 10px auto; /* 减少margin */
            padding: 30px; /* 减少内边距 */
            background: #ffffff;
            border-radius: 16px;
            position: relative;
            text-align: center;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            border: 1px solid rgba(0, 0, 0, 0.05);
        }

        .card-header {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 30px;
        }

        .phonetic-symbol {
            font-size: 100px;
            font-weight: bold;
            text-align: center;
            color: #2c3e50; /* 深灰色文字，护眼 */
            letter-spacing: -1px;
        }

        .favorite-btn {
            position: absolute;
            top: -10px;
            right: -10px;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background-color: transparent;
            border: none;
            font-size: 24px;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .favorite-btn:hover {
            transform: scale(1.1);
        }

        .favorite-btn.active {
            color: #ffd700; /* 金色，表示已收藏 */
        }

        .info-section {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
            margin-bottom: 24px;
        }

        .info-item {
            background-color: #f8f9fa; /* 浅灰色背景，护眼 */
            padding: 16px;
            border-radius: 12px;
        }

        .info-label {
            font-size: 13px;
            color: #6c757d; /* 柔和灰色，护眼 */
            margin-bottom: 6px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .info-content {
            font-size: 18px;
            color: #2c3e50; /* 深灰色文字，护眼 */
            font-weight: 600;
        }

        .pronunciation-section {
            background-color: #f8f9fa; /* 浅灰色背景，护眼 */
            padding: 20px;
            border-radius: 12px;
            font-size: 16px;
            color: #2c3e50; /* 深灰色文字，护眼 */
            line-height: 1.5;
        }

        .pronunciation-title {
            font-weight: 600;
            margin-bottom: 8px;
            color: #2c3e50; /* 深灰色文字，护眼 */
        }

        .examples {
            margin-top: 8px;
            font-style: italic;
            color: #6c757d; /* 柔和灰色，护眼 */
            font-size: 15px;
        }

        .examples strong {
            color: #2c3e50; /* 突出显示单词 */
            font-weight: 600;
        }

        /* 合并控制按钮和播放按钮在同一排 */
        .combined-controls {
            display: flex;
            justify-content: space-between; /* 让播放按钮和切换按钮在两侧 */
            align-items: center;
            gap: 20px;
            width: 85%;
            max-width: 700px;
            margin: 24px auto;
        }

        .controls {
            display: flex;
            gap: 20px;
        }

        .control-btn {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background-color: #4a90e2; /* 柔和蓝色，护眼 */
            color: white;
            border: none;
            font-size: 24px;
            cursor: pointer;
            transition: background-color 0.3s, transform 0.2s;
            box-shadow: 0 2px 10px rgba(74, 144, 226, 0.3);
        }

        .control-btn:hover {
            background-color: #357abd;
            transform: scale(1.05);
        }

        .control-btn:active {
            transform: scale(0.95);
        }

        .control-btn:disabled {
            background-color: #d1d1d6;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .playback-controls {
            display: flex;
            gap: 10px;
        }

        .playback-btn {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background-color: #4a90e2; /* 柔和蓝色，护眼 */
            color: white;
            border: none;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.3s, transform 0.2s;
            box-shadow: 0 2px 10px rgba(74, 144, 226, 0.3);
            padding: 0;
        }

        .playback-btn:hover {
            background-color: #357abd;
            transform: scale(1.05);
        }

        .playback-btn:active {
            transform: scale(0.95);
        }

        .playback-btn.active {
            background-color: #2ecc71; /* 柔和绿色，护眼 */
            box-shadow: 0 2px 10px rgba(46, 204, 113, 0.3);
        }

        .index-section {
            display: grid;
            grid-template-columns: repeat(16, 1fr); /* 16列，需要3行 */
            gap: 3px; /* 进一步减少间距 */
            width: 90%;
            max-width: 1000px;
            margin: 16px auto; /* 减少margin */
        }

        .index-btn {
            aspect-ratio: 1;
            border-radius: 4px; /* 进一步减小圆角 */
            background-color: #e5e5ea;
            color: #000000;
            border: none;
            font-size: 9px; /* 进一步减小字体 */
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.3s, transform 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1px; /* 进一步减小内边距 */
        }

        .index-btn:hover {
            background-color: #d1d1d6;
            transform: scale(1.05);
        }

        .index-btn:active {
            transform: scale(0.95);
        }

        .index-btn.active {
            background-color: #4a90e2; /* 柔和蓝色，护眼 */
            color: white;
        }

        .footer {
            text-align: center;
            padding: 16px;
            background-color: #f0f9ff; /* 浅蓝色背景，护眼 */
            color: #8e8e93;
            font-size: 14px;
            border-top: 1px solid #e5e5ea;
        }

        @media (max-width: 600px) {
            .container {
                padding: 16px;
            }
            
            .card {
                width: 100%;
                min-width: auto;
                padding: 24px;
                margin: 16px auto;
            }
            
            .phonetic-symbol {
                font-size: 72px;
            }
            
            .info-section {
                grid-template-columns: 1fr;
                gap: 16px;
            }
            
            .combined-controls {
                flex-direction: column;
                gap: 16px;
                width: 100%;
            }
            
            .controls {
                gap: 16px;
            }
            
            .control-btn {
                width: 48px;
                height: 48px;
                font-size: 20px;
            }
            
            .playback-controls {
                gap: 10px;
                flex-wrap: wrap;
                justify-content: center;
            }
            
            .playback-btn {
                padding: 10px 16px;
                font-size: 14px;
            }
            
            .index-section {
                grid-template-columns: repeat(8, 1fr);
                gap: 6px;
                width: 100%;
            }
            
            .index-btn {
                font-size: 12px;
            }
        }

        @media (min-width: 601px) and (max-width: 1024px) {
            .index-section {
                grid-template-columns: repeat(12, 1fr);
                gap: 8px;
            }
            
            .index-btn {
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="card-header">
                <div class="phonetic-symbol" id="phoneticSymbol">/i:/</div>
                <button class="favorite-btn" id="favoriteBtn" onclick="toggleFavorite();">⭐</button>
            </div>
            <div class="info-section">
                <div class="info-item">
                    <div class="info-label">音标名称</div>
                    <div class="info-content" id="phoneticName">长衣音</div>
                </div>
                <div class="info-item">
                    <div class="info-label">中文谐音</div>
                    <div class="info-content" id="phoneticPinyin">衣（拉长）</div>
                </div>
            </div>
            <div class="pronunciation-section">
                <div class="pronunciation-title">发音规则</div>
                <div id="pronunciationRule">舌尖靠近下齿，舌前部抬起，嘴唇向两旁张开成扁平形</div>
                <div class="examples" id="exampleWords">例词：<strong>sheep</strong>, <strong>green</strong>, <strong>please</strong></div>
            </div>
        </div>
        <div class="combined-controls">
            <div class="playback-controls">
                <button class="playback-btn" id="seqBtn" onclick="setPlaybackMode('sequential')">顺序</button>
                <button class="playback-btn" id="randBtn" onclick="setPlaybackMode('random')">随机</button>
                <button class="playback-btn" id="favBtn" onclick="setPlaybackMode('favorites')">收藏</button>
                <button class="playback-btn" id="pauseBtn" onclick="pausePlayback()">暂停</button>
            </div>
            <div class="controls">
                <button class="control-btn" id="prevBtn" onclick="prevCard();">&#8249;</button>
                <button class="control-btn" id="nextBtn" onclick="nextCard();">&#8250;</button>
            </div>
        </div>
        <div class="index-section" id="indexSection"></div>
    </div>
    <div class="footer">
        国际音标学习卡片 - Created by cpluser09
    </div>

    <script src="app.js"></script>
</body>
</html>
