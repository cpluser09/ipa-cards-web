<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>测试收藏按钮和播放功能</title>
    <style>
        .favorite-btn {
            position: absolute;
            top: -10px;
            right: -10px;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background-color: transparent;
            border: none;
            font-size: 24px;
            cursor: pointer;
            transition: transform 0.2s;
            color: #d3d3d3; /* 默认灰色，表示未收藏 */
        }

        .favorite-btn:hover {
            transform: scale(1.1);
        }

        .favorite-btn.active {
            color: #ffd700; /* 金色，表示已收藏 */
        }

        .card {
            position: relative;
            width: 300px;
            margin: 50px auto;
            padding: 20px;
            border: 1px solid #ccc;
            border-radius: 10px;
            text-align: center;
        }

        .controls {
            margin-top: 20px;
        }

        button {
            margin: 0 5px;
            padding: 10px 15px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            background-color: #4a90e2;
            color: white;
            font-size: 16px;
        }

        button:hover {
            background-color: #357abd;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="phonetic-symbol">/i:/</div>
        <button class="favorite-btn" id="favoriteBtn">⭐</button>
        <div class="info">
            <h3>长衣音</h3>
            <p>衣（拉长）</p>
        </div>
    </div>
    
    <div class="controls">
        <button id="toggleBtn">切换收藏状态</button>
        <button id="seqBtn">顺序播放</button>
        <button id="randBtn">随机播放</button>
        <button id="pauseBtn">暂停</button>
    </div>
    
    <p id="status"></p>
    <p id="favorites"></p>
    <p id="playbackMode"></p>

    <script>
        // 模拟 app.js 中的变量
        let currentIndex = 0;
        let playbackMode = 'paused';
        let playbackInterval = null;
        let favorites = JSON.parse(localStorage.getItem('ipa_favorites')) || [];
        
        const favoriteBtn = document.getElementById('favoriteBtn');
        const toggleBtn = document.getElementById('toggleBtn');
        const seqBtn = document.getElementById('seqBtn');
        const randBtn = document.getElementById('randBtn');
        const pauseBtn = document.getElementById('pauseBtn');
        const status = document.getElementById('status');
        const favoritesEl = document.getElementById('favorites');
        const playbackModeEl = document.getElementById('playbackMode');
        
        // 更新收藏按钮状态
        function updateFavoriteButton() {
            console.log('updateFavoriteButton called');
            console.log('currentIndex:', currentIndex);
            console.log('favorites:', favorites);
            
            if (favorites.includes(currentIndex)) {
                favoriteBtn.classList.add('active');
                status.textContent = '已收藏';
            } else {
                favoriteBtn.classList.remove('active');
                status.textContent = '未收藏';
            }
            
            favoritesEl.textContent = '收藏的卡片: ' + JSON.stringify(favorites);
        }
        
        // 切换收藏状态
        function toggleFavorite() {
            console.log('toggleFavorite called');
            
            if (favorites.includes(currentIndex)) {
                favorites = favorites.filter(index => index !== currentIndex);
            } else {
                favorites.push(currentIndex);
            }
            
            localStorage.setItem('ipa_favorites', JSON.stringify(favorites));
            updateFavoriteButton();
        }
        
        // 设置播放模式
        function setPlaybackMode(mode) {
            console.log('setPlaybackMode called');
            
            pausePlayback();
            playbackMode = mode;
            playbackModeEl.textContent = '播放模式: ' + playbackMode;
            
            if (mode !== 'paused') {
                startPlayback();
            }
        }
        
        // 开始播放
        function startPlayback() {
            console.log('startPlayback called');
            
            const interval = 2000; // 2秒切换一次
            
            playbackInterval = setInterval(() => {
                if (playbackMode === 'sequential') {
                    currentIndex++;
                    if (currentIndex > 3) currentIndex = 0; // 只模拟 4 个卡片
                } else if (playbackMode === 'random') {
                    currentIndex = Math.floor(Math.random() * 4); // 随机选择
                } else if (playbackMode === 'favorites') {
                    if (favorites.length > 0) {
                        const currentFavIndex = favorites.indexOf(currentIndex);
                        if (currentFavIndex < favorites.length - 1) {
                            currentIndex = favorites[currentFavIndex + 1];
                        } else {
                            currentIndex = favorites[0];
                        }
                    }
                }
                
                console.log('New currentIndex:', currentIndex);
                updateFavoriteButton();
            }, interval);
        }
        
        // 暂停播放
        function pausePlayback() {
            console.log('pausePlayback called');
            
            if (playbackInterval) {
                clearInterval(playbackInterval);
                playbackInterval = null;
            }
            
            playbackMode = 'paused';
            playbackModeEl.textContent = '播放模式: ' + playbackMode;
        }
        
        // 事件绑定
        toggleBtn.addEventListener('click', toggleFavorite);
        seqBtn.addEventListener('click', () => setPlaybackMode('sequential'));
        randBtn.addEventListener('click', () => setPlaybackMode('random'));
        pauseBtn.addEventListener('click', pausePlayback);
        
        // 初始化
        updateFavoriteButton();
        playbackModeEl.textContent = '播放模式: ' + playbackMode;
    </script>
</body>
</html>
